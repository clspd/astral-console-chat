name: Publish Package to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Check package version
        run: bash ./.scripts/check-package-ver.sh

      - name: Prepare release metadata
        id: prep
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BUILD_WORKFLOW_FILE: build-server.yml
        run: |
          chmod +x ./.scripts/prepare-publish.sh
          ./.scripts/prepare-publish.sh

      - name: Install dependencies
        run: pnpm ci || pnpm i

      - name: Test
        run: pnpm test --if-present

      - name: Build project
        run: pnpm run build --if-present

      - name: Publish to npm with provenance
        shell: bash
        env:
          NPM_DIST_TAG: ${{ steps.prep.outputs.npm_dist_tag }}
        run: |
          if [ "$NPM_DIST_TAG" = "latest" ]; then
            npm publish --provenance
          else
            npm publish --provenance --tag "$NPM_DIST_TAG"
          fi
